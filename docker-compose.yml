version: "3.9"

# =============================================================
#  Log4Shell (CVE-2021-44228) démó labor
#  Komponensek:
#    - attacker    : LDAP + HTTP szerver (exploit infrastructure)
#    - vulnerable  : Spring Boot app Log4j 2.14.1-gyel
#    - wazuh-manager / wazuh-indexer / wazuh-dashboard : SIEM
# =============================================================

networks:
  demo-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/24

volumes:
  wazuh-indexer-data:
  wazuh-manager-config:
  wazuh-manager-logs:

services:

  # -------------------------------------------------------
  # 1. TÁMADÓ – LDAP + HTTP szerver
  #    LDAP: fogadja a Log4j lookup kéréseit, visszaad egy
  #          Java class referenciát
  #    HTTP: kiszolgálja a letöltendő malicious .class fájlt
  # -------------------------------------------------------
  attacker:
    build:
      context: ./attacker
      dockerfile: Dockerfile
    container_name: attacker
    hostname: attacker
    networks:
      demo-net:
        ipv4_address: 10.5.0.10
    ports:
      - "1389:1389"   # LDAP
      - "8888:8888"   # HTTP (malicious class hosting)
    environment:
      - ATTACKER_IP=10.5.0.10
    restart: unless-stopped

  # -------------------------------------------------------
  # 2. ÁLDOZAT – sebezhető Java webalkalmazás
  #    Log4j 2.14.1 (sérülékeny verzió)
  #    Spring Boot REST endpoint – loggolja a User-Agent-et
  # -------------------------------------------------------
  vulnerable-app:
    build:
      context: ./vulnerable-app
      dockerfile: Dockerfile
    container_name: vulnerable-app
    hostname: vulnerable-app
    networks:
      demo-net:
        ipv4_address: 10.5.0.20
    ports:
      - "8080:8080"   # webalkalmazás
    environment:
      - WAZUH_MANAGER=10.5.0.30
      - WAZUH_AGENT_NAME=vulnerable-app
    depends_on:
      - attacker
      - wazuh-manager
    restart: unless-stopped

  # -------------------------------------------------------
  # 3. WAZUH MANAGER
  # -------------------------------------------------------
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.3
    container_name: wazuh-manager
    hostname: wazuh-manager
    networks:
      demo-net:
        ipv4_address: 10.5.0.30
    ports:
      - "1514:1514/udp"   # agent komunikáció
      - "1515:1515"       # agent regisztráció
      - "55000:55000"     # REST API
    environment:
      - WAZUH_API_USERNAME=wazuh
      - WAZUH_API_PASSWORD=MyS3cur3P4ssw0rd!
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
    volumes:
      - wazuh-manager-config:/var/ossec/etc
      - wazuh-manager-logs:/var/ossec/logs
      - ./wazuh-config/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
      - ./wazuh-config/ossec.conf:/var/ossec/etc/ossec.conf:ro
    restart: unless-stopped

  # -------------------------------------------------------
  # 4. WAZUH INDEXER (OpenSearch)
  # -------------------------------------------------------
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.3
    container_name: wazuh-indexer
    hostname: wazuh.indexer
    networks:
      demo-net:
        ipv4_address: 10.5.0.31
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=SecretPassword123!
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    restart: unless-stopped

  # -------------------------------------------------------
  # 5. WAZUH DASHBOARD (Kibana-alapú UI)
  # -------------------------------------------------------
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    container_name: wazuh-dashboard
    hostname: wazuh-dashboard
    networks:
      demo-net:
        ipv4_address: 10.5.0.32
    ports:
      - "5601:5601"   # Dashboard UI: https://localhost:5601
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh-manager
      - API_USERNAME=wazuh
      - API_PASSWORD=MyS3cur3P4ssw0rd!
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    restart: unless-stopped
